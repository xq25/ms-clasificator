# ============================================================
# Perfil DOCKER — sobreescribe application.properties
# Se activa con: SPRING_PROFILES_ACTIVE=dev,docker  (en docker-compose)
# NOTA: "dev" debe mantenerse activo para que los @Profile("dev") de
#        StorageConfig (MinIO) sigan funcionando.
# ============================================================

# ── URL del ms-security dentro de la red Docker ─────────────
# El SecurityInterceptor llama aquí para validar cada request.
# En local era localhost:8080; en Docker es el nombre del servicio.
ms.security.url=http://ms-security:8080

# ── Base de datos MySQL (contenedor) ────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/db-clasificator?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=jacobo123

# ── MinIO (contenedor) ──────────────────────────────────────
# Estas propiedades no existían en application.properties local
# porque se configuraban de forma externa. Aquí las definimos para Docker.
storage.minio.endpoint=http://minio:9000
storage.minio.public-endpoint=http://localhost/api/minio
storage.minio.access-key=minioadmin
storage.minio.secret-key=minioadmin
storage.minio.bucket=medical-images

# ── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost
